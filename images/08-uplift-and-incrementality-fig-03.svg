<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">The persuadables matrix: prescribe-if-treated versus prescribe-if-untreated, with propensity and uplift targeting arrows</title>
  <desc>A two-by-two matrix of prescribes-if-treated against prescribes-if-untreated. Persuadables is the only profitable cell and is the focal cell; sleeping dogs is the hazard cell; sure things and lost causes are wasted spend. A propensity-targeting arrow points to sure things; an uplift-targeting arrow points to persuadables.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="AI-Driven Programmatic HCP Marketing" book-slug="ai-driven-programmatic-hcp-marketing" chapter="08-uplift-and-incrementality" figure-number="03" figure-title="The persuadables 2x2" figure-slug="persuadables-2x2" figure-type="Diagram" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="pantry/08-uplift-and-incrementality-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="450" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">If you remember one picture: propensity targets sure things, uplift targets persuadables</text>

  <!-- Matrix square: 280x280 at x=200,y=64 -->
  <!-- quadrant geometry: each 140x140 -->
  <!-- top-left (200,64): prescribes if untreated YES, if treated NO -> lost causes? -->
  <!-- Axis: x = prescribes if treated (left NO, right YES); y = prescribes if untreated (top YES, bottom NO) -->
  <!-- TL: treated NO, untreated YES -> would prescribe anyway w/o treatment, not if treated... that's sleeping dogs (treatment reduces) -->
  <!-- Standard uplift layout:
       y(untreated) top=YES bottom=NO ; x(treated) left=NO right=YES
       TL: untreated YES, treated NO  -> sleeping dogs (treatment lowers prescribing)
       TR: untreated YES, treated YES -> sure things
       BL: untreated NO,  treated NO  -> lost causes
       BR: untreated NO,  treated YES -> persuadables  -->

  <!-- TL sleeping dogs : hazard (red) -->
  <rect x="200" y="64" width="140" height="140" rx="0" fill="#C8102E" fill-opacity="0.18" stroke="#D4D4D4" stroke-width="1"/>
  <!-- TR sure things : wasted gray -->
  <rect x="340" y="64" width="140" height="140" rx="0" fill="#D4D4D4" fill-opacity="0.35" stroke="#D4D4D4" stroke-width="1"/>
  <!-- BL lost causes : wasted gray -->
  <rect x="200" y="204" width="140" height="140" rx="0" fill="#D4D4D4" fill-opacity="0.35" stroke="#D4D4D4" stroke-width="1"/>
  <!-- BR persuadables : focal -->
  <rect x="340" y="204" width="140" height="140" rx="0" fill="#C8102E" fill-opacity="0.10" stroke="#2a1a0e" stroke-width="1.5"/>

  <!-- cell labels (positional meaning) -->
  <text x="270" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">sleeping dogs</text>
  <text x="270" y="146" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">(hazard)</text>
  <text x="410" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" text-anchor="middle">sure things</text>
  <text x="270" y="278" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454" text-anchor="middle">lost causes</text>
  <text x="410" y="270" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">persuadables</text>
  <text x="410" y="286" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle">(only profitable)</text>

  <!-- Axis labels -->
  <text x="410" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">prescribes if treated  →  yes</text>
  <text x="200" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">no  ←</text>
  <text x="186" y="134" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle" transform="rotate(-90 186 134)">untreated: yes  ↑</text>
  <text x="186" y="274" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle" transform="rotate(-90 186 274)">no  ↓</text>

  <!-- Targeting arrows -->
  <!-- propensity targeting -> sure things (ochre/decorative? no, second data category gray-ink). Use ink with marker; label. -->
  <rect x="512" y="92" width="148" height="40" rx="0" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="586" y="108" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">propensity</text>
  <text x="586" y="124" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">targeting</text>
  <line x1="512" y1="120" x2="482" y2="132" stroke="#787878" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- uplift targeting -> persuadables (the recommended move) -->
  <rect x="512" y="276" width="148" height="40" rx="0" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="586" y="292" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">uplift</text>
  <text x="586" y="308" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">targeting</text>
  <line x1="512" y1="290" x2="482" y2="278" stroke="#C8102E" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Caption -->
  <text x="32" y="404" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Propensity targeting buys sure things (wasted spend, the source of inflated lift).</text>
  <text x="32" y="420" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Uplift targeting buys persuadables — the recommended move.</text>
</svg>
