  <rect x="226" y="110" width="184" height="140" rx="0" stroke="#C8102E" stroke-width="1.5" fill="#FFFFFF"/>
  <text x="318" y="138" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">LAB</text>
