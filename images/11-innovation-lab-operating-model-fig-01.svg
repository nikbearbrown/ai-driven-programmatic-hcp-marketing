  <text x="318" y="284" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">public data &#183; Levels 0&#8211;3</text>
  <text x="593" y="284" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">proprietary &#183; Levels 4&#8211;6</text>

  <!-- Caption -->
  <text x="32" y="360" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The lab pulls public research in, tests it cheaply, and routes survivors out. Only the handoff</text>
  <text x="32" y="376" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">brief crosses the firewall — protecting the partner's IP and the Fellow's research independence.</text>

