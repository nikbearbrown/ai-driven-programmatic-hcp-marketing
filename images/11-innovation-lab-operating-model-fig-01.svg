<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The inbound innovation funnel and the IP firewall</title>
  <desc>External public research flows into the lab, which scouts, hypothesizes, tests, scores, and decides go or kill. A vertical dashed firewall separates the lab from the partner. A single handoff-brief arrow crosses the firewall into the partner's proprietary replication, prototype, and resourced-product stages.</desc>
