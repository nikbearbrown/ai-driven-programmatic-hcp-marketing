  <rect x="0" y="0" width="700" height="450" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The Qini curve: how much incremental response a targeting ranking captures</text>

  <!-- Plot: x 64..620, y 64..344. origin (64,344) endpoint (620,64) -->
  <rect x="64" y="64" width="556" height="280" rx="0" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Qini shaded region: between actual curve and diagonal -->
  <!-- diagonal: (64,344)->(620,64). actual bows above. Fill path. -->
