  <!-- axes -->
  <line x1="64" y1="344" x2="620" y2="344" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="64" y1="344" x2="64" y2="64" stroke="#2a1a0e" stroke-width="1.5"/>

  <!-- random diagonal (gray, straight) -->
  <line x1="64" y1="344" x2="620" y2="64" stroke="#787878" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- perfect model curve (ink, steep then flat) -->
  <path d="M 64 344 Q 120 100 240 72 L 620 64" fill="none" stroke="#2a1a0e" stroke-width="1.5"/>

  <!-- actual model curve (red, intermediate bow) -->
  <path d="M 64 344 Q 200 180 360 116 Q 500 80 620 64" fill="none" stroke="#C8102E" stroke-width="1.5"/>

