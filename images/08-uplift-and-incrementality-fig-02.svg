<svg viewBox="0 0 700 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">The Qini curve: cumulative incremental response against fraction targeted, with perfect, actual, and random curves</title>
  <desc>Three curves share an origin and endpoint: a perfect-model curve rising steeply then flattening, an actual-model curve bowing moderately above the diagonal, and a random-targeting straight diagonal. The shaded area between the actual curve and the diagonal is the Qini coefficient.</desc>
