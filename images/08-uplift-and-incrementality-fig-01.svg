<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The propensity-versus-incrementality inversion: incremental effect peaks in the mid-propensity range</title>
  <desc>An inverted-U curve of incremental effect against propensity score. The curve is near zero at the low-propensity left tail, peaks over the mid range, and falls toward zero at the high-propensity right tail. The peak zone is highlighted as profitable; both tails are muted as wasted spend.</desc>
