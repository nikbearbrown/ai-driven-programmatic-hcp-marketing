  <title id="fig-title-01">De-identification removes the patient and leaves the prescriber</title>
  <desc>Two-column pipeline. The left column shows patient fields — name, date of birth, address — struck through at the payer de-identification step. The right column shows the National Provider Identifier persisting unchanged through broker, pharma buyer, model and bid.</desc>
