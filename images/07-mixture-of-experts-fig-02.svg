<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">What MoE routes on: token type in a sequence versus a tabular NPI feature vector with no structure to route on</title>
  <desc>Two side-by-side panels. Left: a token sequence flows into a MoE layer and each token routes to an expert by token type, shown as color-distinct routes. Right: a tabular NPI feature vector flows toward the same architecture, but a question mark sits over the routing because there is no syntactic structure to route on. Caption flags physician archetypes as an open question, not an established result.</desc>
