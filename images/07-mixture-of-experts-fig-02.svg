  <line x1="32" y1="336" x2="668" y2="336" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="32" y="356" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">MoE routing specializes on token type in sequential models. What it would route on in a feature-vector regime is</text>
