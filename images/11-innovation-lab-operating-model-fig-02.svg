  <title id="fig-title-02">The four-stage productization pipeline</title>
  <desc>A horizontal flow of four stages. Stage 1, the Fellow's open research on public data, reaches Evidence Ladder Levels 1 to 3. A handoff brief crosses a vertical dashed IP firewall into Stage 2, the partner's internal proprietary replication at Level 4, then Stage 3 prototype at Level 5, then Stage 4 production at Level 6. The firewall sits between Stage 1 and Stage 2.</desc>
