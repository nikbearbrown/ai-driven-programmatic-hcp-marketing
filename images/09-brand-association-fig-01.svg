  <!-- Caption -->
  <line x1="32" y1="344" x2="668" y2="344" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="32" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Marketing content acts at the mental-association node; prescriptions are the lagging proof. Whether this brand equity</text>
  <text x="32" y="380" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">tracks a drug's clinical value is an untested open question, not a measured relationship.</text>
