<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The brand-formation loop: from clinical evidence through the durable mental association to repeat prescribing and back</title>
  <desc>A directed process chain that closes into a loop. Clinical evidence and label flow through KOL interpretation and the promotional layer into a central HCP mental-association node, then to first trial, observed outcome, repeat-or-abandon, and habit and loyalty, which loops back. The association node is the focal mechanism node where marketing acts.</desc>
