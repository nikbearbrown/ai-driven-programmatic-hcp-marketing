  <title id="fig-title-01">The four tracks on the Evidence Ladder</title>
  <desc>An Evidence Ladder with rungs L0 at the bottom up to L6 at the top. The four portfolio tracks are placed by the level public data lets them reach: Track A (Lift) and Track B (Brand) span L2 to L3, Track C (Models) sits at L3, and Track D (Ethics/Privacy) splits with D1 and D3 at L2 and D2 at L3. A red horizontal line above L3 labeled "proprietary data required" marks the public-data ceiling.</desc>
