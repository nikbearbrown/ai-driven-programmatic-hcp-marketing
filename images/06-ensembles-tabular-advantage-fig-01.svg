<svg viewBox="0 0 700 420" role="img" aria-labelledby="fig-title-01" xmlns="http://www.w3.org/2000/svg">
  <title id="fig-title-01">Adding models reduces variance but cannot reduce correlated error</title>
  <desc>Three stacked-bar panels of the bias-variance-covariance decomposition. Single model: bias-squared plus variance. Ten-model ensemble: variance shrinks, covariance appears. N to infinity: bias-squared plus covariance, the covariance floor.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="AI-Driven Programmatic HCP Marketing" chapter="06-ensembles-tabular-advantage" figure-number="01" figure-title="Bias-variance-covariance decomposition" figure-type="DIAGRAM" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/06-ensembles-tabular-advantage.md"/></metadata>
  <defs></defs>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Ensemble error: bias<tspan baseline-shift="super" font-size="10">2</tspan> + (1/N)·var + (1-1/N)·covar</text>

  <!-- plot area -->
  <rect x="64" y="48" width="596" height="300" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- y baseline at 348, scale: total height 280 = error 1.0; segments in px -->
  <!-- y ticks -->
