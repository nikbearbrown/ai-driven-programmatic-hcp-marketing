    <line x1="64" y1="68" x2="660" y2="68" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="5 4"/>
    <text x="56" y="72" text-anchor="end">1.0</text>
  </g>

  <!-- Panel 1: single model. bias 70px (348->278), var 140px (278->138) -->
  <rect x="120" y="278" width="100" height="70"  fill="#2a1a0e"/>
  <rect x="120" y="138" width="100" height="140" fill="#787878"/>
  <text x="170" y="368" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">single model</text>
  <text x="170" y="316" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">bias<tspan baseline-shift="super" font-size="8">2</tspan></text>
  <text x="170" y="198" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">variance</text>

  <!-- Panel 2: 10-model. bias 70px, var 14px, covar 60px -->
  <rect x="300" y="278" width="100" height="70" fill="#2a1a0e"/>
  <rect x="300" y="264" width="100" height="14" fill="#787878"/>
  <rect x="300" y="204" width="100" height="60" fill="#C8102E"/>
  <text x="350" y="368" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">10-model ensemble</text>
  <text x="350" y="316" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">bias<tspan baseline-shift="super" font-size="8">2</tspan></text>
