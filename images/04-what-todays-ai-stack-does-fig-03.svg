<svg viewBox="0 0 700 480" role="img" aria-labelledby="fig-title-03" xmlns="http://www.w3.org/2000/svg">
  <title id="fig-title-03">The five-question audit rubric for any vendor claim</title>
  <desc>Vertical flowchart of five audit questions. Each box branches to answered-clearly or not-answered-or-circular. All paths converge on a verdict band: test it, watch it, believe it, or route to Chapter 7.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="AI-Driven Programmatic HCP Marketing" chapter="04-what-todays-ai-stack-does" figure-number="03" figure-title="The five-question audit rubric for any vendor claim" figure-type="INFOGRAPHIC" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/04-what-todays-ai-stack-does.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text x="32" y="28" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Run this rubric on every vendor claim before citing any number</text>

  <!-- five question boxes, left column at x=32, width 360 -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">
    <rect x="32" y="46"  width="360" height="46" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="66">1. What KPI does it move — lift or engagement?</text>
    <text x="44" y="83" font-size="11" fill="#545454">engagement is a leading indicator; lift needs a counterfactual</text>

    <rect x="32" y="124" width="360" height="46" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="144">2. What data feeds it, and who measures?</text>
    <text x="44" y="161" font-size="11" fill="#545454">serving party = measuring party means attribution circularity</text>

    <rect x="32" y="202" width="360" height="46" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="222">3. What evidence — holdout or case study?</text>
    <text x="44" y="239" font-size="11" fill="#545454">vendor case study and paid recognition are not validation</text>

    <rect x="32" y="280" width="360" height="46" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="300">4. Deployed, emerging, or aspirational?</text>
    <text x="44" y="317" font-size="11" fill="#545454">place the claim on the maturity ladder</text>

    <rect x="32" y="358" width="360" height="46" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="44" y="378">5. Real architecture, or a relabel?</text>
    <text x="44" y="395" font-size="11" fill="#545454">MoE / federated / agentic may name something real — or not</text>
  </g>

  <!-- connectors between questions -->
  <line x1="212" y1="92"  x2="212" y2="124" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="212" y1="170" x2="212" y2="202" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="212" y1="248" x2="212" y2="280" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="212" y1="326" x2="212" y2="358" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- branch labels (right of column, not on centerlines) -->
  <text x="400" y="116" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">answered clearly</text>
  <text x="400" y="194" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">answered clearly</text>
  <text x="400" y="272" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">answered clearly</text>
  <text x="400" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">answered clearly</text>

  <!-- circular failure path on the right (red) -->
  <line x1="392" y1="147" x2="500" y2="147" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="392" y1="225" x2="500" y2="225" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="500" y1="147" x2="500" y2="430" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="500" y1="225" x2="500" y2="430" stroke="#C8102E" stroke-width="1.5"/>
  <text x="512" y="190" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#C8102E">not answered /</text>
  <text x="512" y="203" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#C8102E">circular</text>

  <!-- converge arrow from Q5 down to verdict -->
  <line x1="212" y1="404" x2="212" y2="430" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- verdict band -->
  <rect x="32" y="430" width="636" height="34" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" text-anchor="middle">
    <text x="120" y="451" fill="#2a1a0e">TEST IT</text>
    <text x="280" y="451" fill="#2a1a0e">WATCH IT</text>
    <text x="430" y="451" fill="#2a1a0e">BELIEVE IT</text>
    <text x="590" y="451" fill="#C8102E">ROUTE TO CH.7</text>
  </g>

  <text x="668" y="476" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CH.04</text>
