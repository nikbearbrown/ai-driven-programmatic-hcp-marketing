  <rect x="64" y="336" width="576" height="48" rx="0" stroke="#D4D4D4" stroke-width="1" fill="#F5F5F5"/>
  <text x="80" y="362" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The gap between event and targeting signal is where targeting error lives — a physician who switched in</text>
  <text x="80" y="376" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Q2 can still sit atop a Q2 list built from Q1 claims; the lag also distorts any measured "lift."</text>
