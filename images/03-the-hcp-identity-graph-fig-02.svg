  <title id="fig-title-02">The gap between event and targeting signal is where targeting error lives</title>
  <desc>Two parallel timelines. The top track shows the claims-data lag from prescription written on day 0 through pharmacy adjudication, payer processing, broker aggregation, monthly model refresh, to targeting list deployment. The bottom track shows a real-time EHR trigger going from day 0 directly to a bid.</desc>
