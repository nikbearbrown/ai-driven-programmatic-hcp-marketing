  <title id="fig-title-03">Durability decay: only the delayed re-measurement separates durable equity from a transient recall bump</title>
  <desc>Two lines across three time points — pre-exposure, immediate post, delayed post — start at the same baseline and rise identically to immediate post. At the delayed post-test the durable line holds elevated while the transient line decays back toward baseline. They are indistinguishable until the third time point.</desc>
