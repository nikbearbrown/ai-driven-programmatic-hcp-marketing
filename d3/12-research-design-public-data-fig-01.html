<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Figure 12.1 — The fundamental problem of causal inference</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;}
  @media (prefers-color-scheme: dark){:root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}}
  html,body{margin:0;padding:0;background:var(--color-white);color:var(--color-ink);}
  #wrap{max-width:760px;margin:0 auto;}
  .title{font-family:'EB Garamond','Garamond',Georgia,serif;font-size:15px;padding:8px 16px 0;}
  .sub{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .row-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;font-weight:600;}
  .row-state{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;}
  .glyph-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;font-weight:600;}
  .mono{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;fill:var(--color-secondary);}
  .effect{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-ink);}
  .note{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;fill:var(--color-ink);}
  .caption{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);padding:0 16px 12px;}
  #tooltip{position:absolute;pointer-events:none;background:var(--color-ink);color:var(--color-white);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;padding:6px 8px;border-radius:0;opacity:0;transition:opacity 150ms cubic-bezier(0.2,0.8,0.2,1);max-width:240px;}
  .world:focus{outline:none;}
  .world:focus rect.box{stroke:var(--color-red);stroke-width:2;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="wrap">
  <div class="title">One physician, two worlds — and you only ever see one of them</div>
  <svg id="chart" role="img" aria-labelledby="chart-title chart-desc"></svg>
  <div class="caption">The missing counterfactual is the central problem. Adding covariates does not recover World B — structure does. The missing counterfactual is the problem; structure is the solution.</div>
</div>
<div id="tooltip" role="status" aria-live="polite"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = {
  worlds:[
    {world:"A", label:"WORLD A — heavy detailing", state:"observed", observed:true, outcome:"outcome Y(A)", outcomeNote:"measured",
     tip:"World A is the world you actually observe: this physician received heavy detailing and you measure their prescribing outcome."},
    {world:"B", label:"WORLD B — no detailing", state:"unobserved — the missing counterfactual", observed:false, outcome:"outcome Y(B)", outcomeNote:"missing",
     tip:"World B never happened for this physician. The undetailed outcome is missing — it must be imputed from other observable physicians."}
  ]
};
const W=700,H=420;
const svg=d3.select("#chart").attr("viewBox",`0 0 ${W} ${H}`);
svg.append("title").attr("id","chart-title").text("The fundamental problem of causal inference");
svg.append("desc").attr("id","chart-desc").text("Two parallel timelines for one physician: World A (heavy detailing) is observed with a measured outcome; World B (no detailing) is an unobserved ghost box with the outcome missing. The causal effect is the difference between the two.");
const defs=svg.append("defs");
defs.append("marker").attr("id","arrow").attr("markerWidth",8).attr("markerHeight",6).attr("refX",7).attr("refY",3).attr("orient","auto")
  .append("polygon").attr("points","0 0, 8 3, 0 6").attr("fill","var(--color-ink)");
const tip=d3.select("#tooltip");

function draw(){
  svg.selectAll(".dyn").remove();

  svg.append("text").attr("class","dyn sub").attr("x",32).attr("y",30)
    .text("For any physician, you observe either the detailed world or the undetailed world — never both.");

  const rowY={A:84, B:200}, rowH=92, glyphX=520, glyphW=120;

  const g=svg.selectAll(".world").data(FALLBACK_DATA.worlds,d=>d.world).join(
    enter=>{
      const grp=enter.append("g").attr("class","world dyn")
        .attr("tabindex",0).attr("role","img")
        .attr("aria-label",d=>d.label+" — "+d.state);
      grp.append("rect").attr("class","box")
        .attr("x",32).attr("y",d=>rowY[d.world]).attr("width",636).attr("height",rowH).attr("rx",0)
        .attr("fill",d=>d.observed?"var(--color-fill)":"var(--color-white)")
        .attr("stroke",d=>d.observed?"var(--color-border)":"var(--color-red)")
        .attr("stroke-width",d=>d.observed?1:0.75)
        .attr("stroke-dasharray",d=>d.observed?null:"5 4");
      grp.append("text").attr("class","row-label")
        .attr("x",48).attr("y",d=>rowY[d.world]+22)
        .attr("fill",d=>d.observed?"var(--color-ink)":"var(--color-red)")
        .text(d=>d.label);
      grp.append("text").attr("class","row-state")
        .attr("x",48).attr("y",d=>rowY[d.world]+40)
        .attr("fill",d=>d.observed?"var(--color-secondary)":"var(--color-red)")
        .text(d=>d.state);
      // timeline
      grp.append("line")
        .attr("x1",200).attr("y1",d=>rowY[d.world]+64).attr("x2",500).attr("y2",d=>rowY[d.world]+64)
        .attr("stroke",d=>d.observed?"var(--color-ink)":"var(--color-border)")
        .attr("stroke-width",d=>d.observed?1.5:0.75)
        .attr("stroke-dasharray",d=>d.observed?null:"5 4")
        .attr("marker-end",d=>d.observed?"url(#arrow)":null).attr("aria-hidden","true");
      grp.append("text").attr("class","mono").attr("x",200).attr("y",d=>rowY[d.world]+82).text("t0");
      // outcome glyph
      grp.append("rect")
        .attr("x",glyphX).attr("y",d=>rowY[d.world]+36).attr("width",glyphW).attr("height",44).attr("rx",0)
        .attr("fill","var(--color-white)")
        .attr("stroke",d=>d.observed?"var(--color-ink)":"var(--color-red)")
        .attr("stroke-width",d=>d.observed?1.5:0.75)
        .attr("stroke-dasharray",d=>d.observed?null:"5 4");
      grp.append("text").attr("class","glyph-label").attr("text-anchor","middle")
        .attr("x",glyphX+glyphW/2).attr("y",d=>rowY[d.world]+55)
        .attr("fill",d=>d.observed?"var(--color-ink)":"var(--color-red)")
        .text(d=>d.outcome);
      grp.append("text").attr("class","mono").attr("text-anchor","middle")
        .attr("x",glyphX+glyphW/2).attr("y",d=>rowY[d.world]+71)
        .attr("fill",d=>d.observed?"var(--color-secondary)":"var(--color-red)")
        .text(d=>d.outcomeNote);
      return grp;
    }
  );

  // causal-effect arrow between outcome glyphs
  svg.append("line").attr("class","dyn").attr("aria-hidden","true")
    .attr("x1",glyphX+glyphW/2).attr("y1",rowY.A+80).attr("x2",glyphX+glyphW/2).attr("y2",rowY.B+36)
    .attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");
  svg.append("text").attr("class","dyn effect").attr("text-anchor","end").attr("x",500).attr("y",rowY.A+120).text("Causal effect =");
  svg.append("text").attr("class","dyn effect").attr("text-anchor","end").attr("x",500).attr("y",rowY.A+136).text("Y(A) − Y(B)");

  svg.append("text").attr("class","dyn note").attr("x",32).attr("y",332)
    .text("Every design is a different argument for how to impute World B from other observable physicians.");

  function show(event,d){tip.style("opacity",1).html(d.tip).style("left",(event.pageX+12)+"px").style("top",(event.pageY+12)+"px");}
  function hide(){tip.style("opacity",0);}
  g.on("mousemove",show).on("mouseleave",hide)
   .on("focus",function(event,d){const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");})
   .on("blur",hide)
   .on("keydown",function(event,d){if(event.key==="Enter"||event.key===" "){event.preventDefault();show({pageX:this.getBoundingClientRect().left+window.scrollX,pageY:this.getBoundingClientRect().bottom+window.scrollY},d);}});
}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById("chart"));
</script>
</body>
</html>
