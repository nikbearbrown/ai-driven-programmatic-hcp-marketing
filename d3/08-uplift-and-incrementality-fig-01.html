<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Figure 8.1 — The propensity-vs-incrementality inversion</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;}
  @media (prefers-color-scheme: dark){:root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}}
  html,body{margin:0;padding:0;background:var(--color-white);color:var(--color-ink);}
  #wrap{max-width:760px;margin:0 auto;}
  .title{font-family:'EB Garamond','Garamond',Georgia,serif;font-size:15px;padding:8px 16px 0;}
  .axis-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;fill:var(--color-ink);}
  .zone-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .zone-label.focal{fill:var(--color-ink);}
  .tick-label{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;fill:var(--color-secondary);}
  .grid line{stroke:var(--color-border);stroke-width:0.5;}
  .caption{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);padding:0 16px 12px;}
  #tooltip{position:absolute;pointer-events:none;background:var(--color-ink);color:var(--color-white);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;padding:6px 8px;border-radius:0;opacity:0;transition:opacity 150ms cubic-bezier(0.2,0.8,0.2,1);max-width:220px;}
  .pt:focus{outline:none;}
  .pt:focus circle{stroke:var(--color-red);stroke-width:2;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="wrap">
  <div class="title">The inversion: incremental return is highest in the middle, not at high propensity</div>
  <svg id="chart" role="img" aria-labelledby="chart-title chart-desc"></svg>
  <div class="caption">The mid-propensity peak is the only profitable target; both tails are wasted spend. The chapter is built on this inversion.</div>
</div>
<div id="tooltip" role="status" aria-live="polite"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// Inverted-U: incremental effect (CATE) vs propensity score 0..1.
// Near zero at left tail (lost causes), peaks mid (persuadables), near zero at right (sure things).
const FALLBACK_DATA = {
  curve: [
    {x:0.00, y:0.02}, {x:0.05, y:0.03}, {x:0.10, y:0.05}, {x:0.15, y:0.08},
    {x:0.20, y:0.12}, {x:0.25, y:0.18}, {x:0.30, y:0.27}, {x:0.35, y:0.40},
    {x:0.40, y:0.55}, {x:0.45, y:0.72}, {x:0.50, y:0.87}, {x:0.55, y:0.96},
    {x:0.50, y:0.87}
  ],
  // symmetric inverted-U sampled densely below
  peak: {x:0.50, y:1.00},
  zones: [
    {x0:0.00, x1:0.33, label:"lost causes", focal:false, tip:"Low-propensity left tail: little incremental effect. Treating these HCPs is wasted spend."},
    {x0:0.33, x1:0.66, label:"persuadables", focal:true,  tip:"Mid-propensity peak: the highest incremental effect (CATE). The only profitable zone to target."},
    {x0:0.66, x1:1.00, label:"sure things",  focal:false, tip:"High-propensity right tail: they prescribe anyway. Treatment adds little — wasted spend."}
  ]
};
// Build a smooth symmetric inverted-U sample set (parabola-like), zero-ish at tails, peak at 0.5.
FALLBACK_DATA.curve = d3.range(0, 1.0001, 0.02).map(x => {
  const u = (x - 0.5) / 0.5;        // -1..1
  const y = Math.max(0, 1 - u*u);   // parabola peaking at x=0.5
  // flatten tails a touch toward zero
  return {x: x, y: Math.max(0.02, y*0.98 + 0.02*(1-Math.abs(u)))};
});

const W=700,H=420;
const M={top:48,right:40,bottom:56,left:64};
const PW=W-M.left-M.right, PH=H-M.top-M.bottom;
const svg=d3.select("#chart").attr("viewBox",`0 0 ${W} ${H}`);
svg.append("title").attr("id","chart-title").text("The propensity-versus-incrementality inversion: incremental effect peaks in the mid-propensity range");
svg.append("desc").attr("id","chart-desc").text("An inverted-U curve of incremental effect against propensity score. Near zero at the low-propensity left tail, peaking over the mid range, falling toward zero at the high-propensity right tail. The peak zone is the only profitable target.");
const defs=svg.append("defs");
defs.append("marker").attr("id","arrow").attr("markerWidth",8).attr("markerHeight",6).attr("refX",7).attr("refY",3).attr("orient","auto")
  .append("polygon").attr("points","0 0, 8 3, 0 6").attr("fill","var(--color-ink)");
const tip=d3.select("#tooltip");

const x=d3.scaleLinear().domain([0,1]).range([0,PW]);
const y=d3.scaleLinear().domain([0,1]).range([PH,0]);   // zero-baseline

function draw(){
  svg.selectAll(".plot").remove();
  const g=svg.append("g").attr("class","plot").attr("transform",`translate(${M.left},${M.top})`);

  // chart-area background
  g.append("rect").attr("x",0).attr("y",0).attr("width",PW).attr("height",PH)
    .attr("fill","var(--color-fill)").attr("stroke","var(--color-border)").attr("stroke-width",0.75);

  // gridlines (aria-hidden)
  const grid=g.append("g").attr("class","grid").attr("aria-hidden","true");
  y.ticks(5).forEach(t=>{
    grid.append("line").attr("x1",0).attr("x2",PW).attr("y1",y(t)).attr("y2",y(t));
  });
  x.ticks(5).forEach(t=>{
    grid.append("line").attr("y1",0).attr("y2",PH).attr("x1",x(t)).attr("x2",x(t));
  });

  // zone bands: tails muted gray, peak red-tint
  FALLBACK_DATA.zones.forEach(z=>{
    g.append("rect").attr("aria-hidden","true")
      .attr("x",x(z.x0)).attr("y",0).attr("width",x(z.x1)-x(z.x0)).attr("height",PH)
      .attr("fill", z.focal?"var(--color-red)":"var(--color-border)")
      .attr("fill-opacity", z.focal?0.08:0.35);
  });

  // axes
  g.append("line").attr("x1",0).attr("y1",PH).attr("x2",PW).attr("y2",PH).attr("stroke","var(--color-ink)").attr("stroke-width",1.5);
  g.append("line").attr("x1",0).attr("y1",PH).attr("x2",0).attr("y2",0).attr("stroke","var(--color-ink)").attr("stroke-width",1.5);

  // curve (the single red data series)
  const line=d3.line().x(d=>x(d.x)).y(d=>y(d.y)).curve(d3.curveBasis);
  g.append("path").attr("aria-hidden","true").datum(FALLBACK_DATA.curve)
    .attr("fill","none").attr("stroke","var(--color-red)").attr("stroke-width",1.5).attr("d",line);

  // peak marker
  g.append("circle").attr("aria-hidden","true")
    .attr("cx",x(FALLBACK_DATA.peak.x)).attr("cy",y(FALLBACK_DATA.peak.y)).attr("r",3.5).attr("fill","var(--color-red)");

  // axis labels
  g.append("text").attr("class","axis-label").attr("x",PW/2).attr("y",PH+28).attr("text-anchor","middle")
    .text("propensity score (likelihood to prescribe)");
  svg.append("text").attr("class","axis-label").attr("text-anchor","middle")
    .attr("transform",`translate(${M.left-28},${M.top+PH/2}) rotate(-90)`)
    .text("incremental effect (CATE)");

  // ticks
  g.append("text").attr("class","tick-label").attr("x",x(0)).attr("y",PH+16).attr("text-anchor","middle").text("0");
  g.append("text").attr("class","tick-label").attr("x",x(1)).attr("y",PH+16).attr("text-anchor","middle").text("1");
  g.append("text").attr("class","tick-label").attr("x",-6).attr("y",y(0)+4).attr("text-anchor","end").text("0");

  // zone descriptors as interactive marks
  const zg=g.selectAll(".pt").data(FALLBACK_DATA.zones).join(
    enter=>{
      const grp=enter.append("g").attr("class","pt")
        .attr("tabindex",0).attr("role","img")
        .attr("aria-label",d=>d.label+": "+d.tip);
      grp.append("text").attr("class",d=>"zone-label"+(d.focal?" focal":""))
        .attr("x",d=>x((d.x0+d.x1)/2)).attr("y",PH-12).attr("text-anchor","middle").text(d=>d.label);
      grp.append("circle").attr("aria-hidden","true").attr("fill","transparent")
        .attr("cx",d=>x((d.x0+d.x1)/2)).attr("cy",PH-16).attr("r",10);
      return grp;
    }
  );
  function show(event,d){tip.style("opacity",1).html(d.tip).style("left",(event.pageX+12)+"px").style("top",(event.pageY+12)+"px");}
  function hide(){tip.style("opacity",0);}
  zg.on("mousemove",show).on("mouseleave",hide)
    .on("focus",function(event,d){const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");})
    .on("blur",hide)
    .on("keydown",function(event,d){if(event.key==="Enter"||event.key===" "){event.preventDefault();show({pageX:this.getBoundingClientRect().left+window.scrollX,pageY:this.getBoundingClientRect().bottom+window.scrollY},d);}});
}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById("chart"));
</script>
</body>
</html>
