<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Figure 1.4 — The same infrastructure could run both systems</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;}
  @media (prefers-color-scheme: dark){:root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}}
  html,body{margin:0;padding:0;background:var(--color-white);color:var(--color-ink);}
  #wrap{max-width:760px;margin:0 auto;}
  .title{font-family:'EB Garamond','Garamond',Georgia,serif;font-size:15px;padding:8px 16px 0;}
  .colhead{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;font-weight:600;}
  .node rect{fill:var(--color-white);}
  .node.funded rect{stroke:var(--color-red);stroke-width:1.5;}
  .node.unfunded rect{stroke:var(--color-border);stroke-width:1;}
  .node-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;}
  .loop-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .caption{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);padding:0 16px 12px;}
  #tooltip{position:absolute;pointer-events:none;background:var(--color-ink);color:var(--color-white);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;padding:6px 8px;border-radius:0;opacity:0;transition:opacity 150ms cubic-bezier(0.2,0.8,0.2,1);max-width:230px;}
  .node:focus{outline:none;}
  .node:focus rect{stroke:var(--color-red);stroke-width:2;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="wrap">
  <div class="title">One set of rails, two possible systems — only the left one is funded</div>
  <svg id="chart" role="img" aria-labelledby="chart-title chart-desc"></svg>
  <div class="caption">The same SMART on FHIR and CDS Hooks infrastructure could run both systems. The technology is neutral; only the commercial loop is funded at scale. Nobody funds the counter-stack.</div>
</div>
<div id="tooltip" role="status" aria-live="polite"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA={
  commercial:[
    {t:"NPI targeting", tip:"A brand objective is compiled into an NPI list."},
    {t:"Point-of-care impression", tip:"The list drives a bid-time decision firing a CDS Hooks / SMART on FHIR impression."},
    {t:"Prescription", tip:"The impression is followed by a prescription."},
    {t:"Attribution", tip:"The prescription, seen in claims, is attributed back and used to tighten the next NPI list."}
  ],
  counter:[
    {t:"Comparative effectiveness", tip:"The same rails could surface comparative-effectiveness data at the point of prescribing."},
    {t:"Generic alternatives + formulary tier", tip:"It could display the generic alternative and the patient's actual formulary tier."},
    {t:"Patient cost shown", tip:"It could show the patient's real out-of-pocket cost before any price is hidden."},
    {t:"Prescribing decision", tip:"A prescribing decision informed by evidence and cost — technically possible, just unfunded."}
  ]
};
const W=700,H=480, NW=260,NH=40, LX=56, RX=384, Y0=90, DY=68;
const svg=d3.select("#chart").attr("viewBox",`0 0 ${W} ${H}`);
svg.append("title").attr("id","chart-title").text("The same infrastructure could run both systems — only one is funded");
svg.append("desc").attr("id","chart-desc").text("Left column: funded commercial closed loop. Right column: unfunded counter-stack of evidence and cost data.");
const defs=svg.append("defs");
defs.append("marker").attr("id","arrow").attr("markerWidth",8).attr("markerHeight",6).attr("refX",7).attr("refY",3).attr("orient","auto")
  .append("polygon").attr("points","0 0, 8 3, 0 6").attr("fill","var(--color-ink)");
const tip=d3.select("#tooltip");

function column(data,x,funded){
  data.forEach((d,i)=>{
    const y=Y0+i*DY;
    const g=svg.append("g").attr("class","node "+(funded?"funded":"unfunded"))
      .attr("tabindex",0).attr("role","img").attr("aria-label",d.t);
    g.append("rect").attr("x",x).attr("y",y).attr("width",NW).attr("height",NH).attr("rx",0);
    g.append("text").attr("class","node-label").attr("x",x+NW/2).attr("y",y+24).attr("text-anchor","middle")
      .attr("fill",funded?"var(--color-ink)":"var(--color-secondary)").text(d.t);
    if(i<data.length-1){
      svg.append("line").attr("aria-hidden","true").attr("x1",x+NW/2).attr("y1",y+NH).attr("x2",x+NW/2).attr("y2",y+DY-4)
        .attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");
    }
    g.on("mousemove",(event)=>tip.style("opacity",1).html(d.tip).style("left",(event.pageX+12)+"px").style("top",(event.pageY+12)+"px"))
     .on("mouseleave",()=>tip.style("opacity",0))
     .on("focus",function(){const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");})
     .on("blur",()=>tip.style("opacity",0))
     .on("keydown",function(event){if(event.key==="Enter"||event.key===" "){event.preventDefault();const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");}});
  });
}
function draw(){
  svg.selectAll("g,line,text,path").filter(function(){return !this.closest("defs");}).remove();
  svg.append("text").attr("class","colhead").attr("x",LX+NW/2).attr("y",74).attr("text-anchor","middle").attr("fill","var(--color-red)").text("THE COMMERCIAL CLOSED LOOP — funded");
  svg.append("text").attr("class","colhead").attr("x",RX+NW/2).attr("y",74).attr("text-anchor","middle").attr("fill","var(--color-secondary)").text("THE COUNTER-STACK — could exist, unfunded");
  svg.append("line").attr("aria-hidden","true").attr("x1",350).attr("y1",56).attr("x2",350).attr("y2",436).attr("stroke","var(--color-border)").attr("stroke-width",0.75).attr("stroke-dasharray","5 4");
  column(FALLBACK_DATA.commercial,LX,true);
  column(FALLBACK_DATA.counter,RX,false);
  // left feedback loop
  svg.append("path").attr("aria-hidden","true").attr("d",`M ${LX} ${Y0+3*DY+20} L ${LX-20} ${Y0+3*DY+20} L ${LX-20} ${Y0+20} L ${LX-4} ${Y0+20}`)
    .attr("fill","none").attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");
  svg.append("text").attr("class","loop-label").attr("x",LX-12).attr("y",Y0+1.5*DY).attr("text-anchor","middle").attr("transform",`rotate(-90 ${LX-12} ${Y0+1.5*DY})`).text("refines next NPI list");
}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById("chart"));
</script>
</body>
</html>
