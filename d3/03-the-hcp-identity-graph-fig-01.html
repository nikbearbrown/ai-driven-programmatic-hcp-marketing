<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Figure 3.1 — De-identification removes the patient and leaves the prescriber</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;}
  @media (prefers-color-scheme: dark){:root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}}
  html,body{margin:0;padding:0;background:var(--color-white);color:var(--color-ink);}
  #wrap{max-width:760px;margin:0 auto;}
  .title{font-family:'EB Garamond','Garamond',Georgia,serif;font-size:15px;padding:8px 16px 0;}
  .colhead{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;font-weight:600;}
  .stage{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;fill:var(--color-secondary);}
  .patient rect{stroke:var(--color-border);stroke-width:1;}
  .npi rect{stroke:var(--color-red);stroke-width:1.5;fill:var(--color-white);}
  .pl{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .pl.struck{text-decoration:line-through;}
  .npil{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;fill:var(--color-ink);}
  .npisub,.npinote{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:10px;fill:var(--color-secondary);}
  .npiname{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-ink);}
  .caption{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);padding:0 16px 12px;}
  #tooltip{position:absolute;pointer-events:none;background:var(--color-ink);color:var(--color-white);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;padding:6px 8px;border-radius:0;opacity:0;transition:opacity 150ms cubic-bezier(0.2,0.8,0.2,1);max-width:230px;}
  .row:focus{outline:none;}
  .row:focus rect{stroke:var(--color-red);stroke-width:2;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="wrap">
  <div class="title">The asymmetry at the heart of HCP targeting: the patient is stripped; the prescriber stays</div>
  <svg id="chart" role="img" aria-labelledby="chart-title chart-desc"></svg>
  <div class="caption">De-identification removes the patient and leaves the prescriber. This asymmetry is the legal foundation of NPI targeting — the data is anonymous to the patient, fully identified to the physician.</div>
</div>
<div id="tooltip" role="status" aria-live="polite"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA=[
  {stage:"1. Pharmacy", sub:"", patient:"name · DOB · address present", struck:false, npi:"NPI 1234567890", npiName:false, npiNote:"", tip:"A patient fills a script; full identifiers are present at the pharmacy."},
  {stage:"2. Payer", sub:"(Safe Harbor)", patient:"name · DOB · address", struck:true, npi:"NPI 1234567890", npiName:false, npiNote:"", tip:"The payer strips the 18 Safe Harbor patient identifiers. The NPI is not on the list — it stays."},
  {stage:"3. Broker", sub:"", patient:"— patient gone —", struck:false, npi:"NPI 1234567890", npiName:false, npiNote:"+ AMA Masterfile join", tip:"Brokers join de-identified prescribing records to the AMA Physician Masterfile on NPI."},
  {stage:"4. Model", sub:"", patient:"— patient gone —", struck:false, npi:"Dr. Jane Smith named", npiName:true, npiNote:"", tip:"The join yields prescriber-level data: a named physician with prescribing behavior."},
  {stage:"5. Bid", sub:"", patient:"— patient gone —", struck:false, npi:"impression to NPI 123…", npiName:true, npiNote:"", tip:"A bid-time decision serves an impression to the named NPI. The patient was never present."}
];
const W=700,H=480, RH=44, GAP=72, Y0=82, PX=120, NX=420, BW=200;
const svg=d3.select("#chart").attr("viewBox",`0 0 ${W} ${H}`);
svg.append("title").attr("id","chart-title").text("De-identification removes the patient and leaves the prescriber");
svg.append("desc").attr("id","chart-desc").text("Five-stage pipeline: patient identifiers stripped at the payer while the NPI persists to the bid.");
const defs=svg.append("defs");
defs.append("marker").attr("id","arrow").attr("markerWidth",8).attr("markerHeight",6).attr("refX",7).attr("refY",3).attr("orient","auto")
  .append("polygon").attr("points","0 0, 8 3, 0 6").attr("fill","var(--color-ink)");
const tip=d3.select("#tooltip");

function draw(){
  svg.selectAll("g.head,g.rows,line.npi-arrow").remove();
  const head=svg.append("g").attr("class","head");
  head.append("text").attr("class","colhead").attr("x",PX+BW/2).attr("y",62).attr("text-anchor","middle").attr("fill","var(--color-secondary)").text("PATIENT IDENTIFIERS — stripped at the payer");
  head.append("text").attr("class","colhead").attr("x",NX+BW/2).attr("y",62).attr("text-anchor","middle").attr("fill","var(--color-red)").text("NPI — persists through every step");

  const rows=svg.append("g").attr("class","rows");
  FALLBACK_DATA.forEach((d,i)=>{
    const y=Y0+i*GAP;
    const g=rows.append("g").attr("class","row").attr("tabindex",0).attr("role","img").attr("aria-label",d.stage+": "+d.tip);
    g.append("text").attr("class","stage").attr("x",32).attr("y",y+20).text(d.stage);
    if(d.sub) g.append("text").attr("class","npisub").attr("x",32).attr("y",y+34).text(d.sub);
    // patient box
    g.append("rect").attr("class","patient").append("title");
    const pb=g.append("rect").attr("x",PX).attr("y",y).attr("width",BW).attr("height",RH).attr("rx",0)
      .attr("stroke","var(--color-border)").attr("stroke-width",1).attr("fill",i===0?"var(--color-white)":"var(--color-fill)");
    g.append("text").attr("class","pl"+(d.struck?" struck":"")).attr("x",PX+BW/2).attr("y",y+27).attr("text-anchor","middle").text(d.patient);
    // npi box
    g.append("rect").attr("class","npi").attr("x",NX).attr("y",y).attr("width",BW).attr("height",RH).attr("rx",0);
    g.append("text").attr("class",d.npiName?"npiname":"npil").attr("x",NX+BW/2).attr("y",d.npiNote?y+22:y+27).attr("text-anchor","middle").text(d.npi);
    if(d.npiNote) g.append("text").attr("class","npinote").attr("x",NX+BW/2).attr("y",y+36).attr("text-anchor","middle").text(d.npiNote);
    if(i<FALLBACK_DATA.length-1){
      svg.append("line").attr("class","npi-arrow").attr("aria-hidden","true").attr("x1",NX+BW/2).attr("y1",y+RH).attr("x2",NX+BW/2).attr("y2",y+GAP-4)
        .attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");
    }
    g.on("mousemove",(event)=>tip.style("opacity",1).html(d.tip).style("left",(event.pageX+12)+"px").style("top",(event.pageY+12)+"px"))
     .on("mouseleave",()=>tip.style("opacity",0))
     .on("focus",function(){const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");})
     .on("blur",()=>tip.style("opacity",0))
     .on("keydown",function(event){if(event.key==="Enter"||event.key===" "){event.preventDefault();const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");}});
  });
}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById("chart"));
</script>
</body>
</html>
