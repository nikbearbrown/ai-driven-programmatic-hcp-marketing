<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Figure 7.1 — Sparse activation in a MoE layer</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;}
  @media (prefers-color-scheme: dark){:root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}}
  html,body{margin:0;padding:0;background:var(--color-white);color:var(--color-ink);}
  #wrap{max-width:760px;margin:0 auto;}
  .title{font-family:'EB Garamond','Garamond',Georgia,serif;font-size:15px;padding:8px 16px 0;}
  .node rect{stroke:var(--color-border);stroke-width:1;fill:var(--color-white);}
  .node.active rect{fill:var(--color-ink);stroke:var(--color-ink);stroke-width:1;}
  .node.inactive rect{fill:var(--color-fill);stroke:var(--color-border);stroke-width:0.75;}
  .node-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;fill:var(--color-ink);}
  .node-label.active{fill:var(--color-white);font-size:11px;}
  .node-label.inactive{fill:var(--color-secondary);font-size:11px;}
  .mono{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;fill:var(--color-secondary);}
  .small{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .band-label{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .caption{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);padding:0 16px 12px;}
  #tooltip{position:absolute;pointer-events:none;background:var(--color-ink);color:var(--color-white);font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;padding:6px 8px;border-radius:0;opacity:0;transition:opacity 150ms cubic-bezier(0.2,0.8,0.2,1);max-width:230px;}
  .node:focus{outline:none;}
  .node:focus rect{stroke:var(--color-red);stroke-width:2;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="wrap">
  <div class="title">Sparse activation in a MoE layer: gating fires only k of N experts</div>
  <svg id="chart" role="img" aria-labelledby="chart-title chart-desc"></svg>
  <div class="caption">Eight experts and top-2 are an illustrative count [inferred], not a claimed configuration. Capacity scales with N (total parameters); compute scales with k (active per pass).</div>
</div>
<div id="tooltip" role="status" aria-live="polite"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = {
  input:{id:"x", label:"x", x:32, y:120, w:56, h:40, tip:"Input vector x enters the MoE layer and is shown to the gating network."},
  gate:{id:"gate", label:["gating","network"], x:136, y:112, w:88, h:56, tip:"The gating network scores every expert for this input and selects the top-k to activate."},
  experts:[
    {idx:1, x:336, y:56,  w:96, h:24, active:false, tip:"Inactive expert: scored by the gate but not in the top-k, so it does no compute this pass."},
    {idx:2, x:336, y:88,  w:96, h:24, active:false, tip:"Inactive expert: scored by the gate but not in the top-k, so it does no compute this pass."},
    {idx:3, x:336, y:120, w:96, h:24, active:true,  tip:"Active expert (top-2): the gate routed this input here, so it runs and contributes to the output."},
    {idx:4, x:336, y:152, w:96, h:24, active:false, tip:"Inactive expert: scored by the gate but not in the top-k, so it does no compute this pass."},
    {idx:5, x:336, y:184, w:96, h:24, active:false, tip:"Inactive expert: scored by the gate but not in the top-k, so it does no compute this pass."},
    {idx:6, x:336, y:216, w:96, h:24, active:true,  tip:"Active expert (top-2): the gate routed this input here, so it runs and contributes to the output."},
    {idx:7, x:336, y:248, w:96, h:24, active:false, tip:"Inactive expert: scored by the gate but not in the top-k, so it does no compute this pass."},
    {idx:8, x:336, y:280, w:96, h:24, active:false, tip:"Inactive expert: scored by the gate but not in the top-k, so it does no compute this pass."}
  ],
  combine:{id:"sum", label:["weighted","sum"], x:528, y:148, w:80, h:48, tip:"The active experts' outputs are combined as a gate-weighted sum to produce the layer output."},
  output:{id:"y", label:"y", x:616, y:200, w:52, h:40, tip:"Output y: the weighted combination of only the active experts' contributions."},
  band:{
    line_y:328,
    capacity:{label:"capacity scales with N (total parameters)", text_y:350, bar_y:356, bar_w:608, color:"var(--color-red)", tip:"All N experts hold parameters, so total model capacity grows with N."},
    compute:{label:"compute scales with k (active per pass)", text_y:392, bar_y:398, bar_w:152, color:"var(--color-ink)", tip:"Only k experts run per input, so per-pass compute grows with k, not N."}
  }
};
const W=700,H=420;
const svg=d3.select("#chart").attr("viewBox",`0 0 ${W} ${H}`);
svg.append("title").attr("id","chart-title").text("Sparse activation in a MoE layer: gating selects top-k of N experts");
svg.append("desc").attr("id","chart-desc").text("Input x flows into a gating network that fans out to eight experts; only two fire (top-2). Their outputs combine into a weighted sum producing y. A band below contrasts capacity scaling with N against compute scaling with k.");
const defs=svg.append("defs");
defs.append("marker").attr("id","arrow").attr("markerWidth",8).attr("markerHeight",6).attr("refX",7).attr("refY",3).attr("orient","auto")
  .append("polygon").attr("points","0 0, 8 3, 0 6").attr("fill","var(--color-ink)");
const tip=d3.select("#tooltip");

function bindTip(sel){
  sel.on("mousemove",(event,d)=>tip.style("opacity",1).html(d.tip).style("left",(event.pageX+12)+"px").style("top",(event.pageY+12)+"px"))
     .on("mouseleave",()=>tip.style("opacity",0))
     .on("focus",function(event,d){const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");})
     .on("blur",()=>tip.style("opacity",0))
     .on("keydown",function(event,d){if(event.key==="Enter"||event.key===" "){event.preventDefault();const r=this.getBoundingClientRect();tip.style("opacity",1).html(d.tip).style("left",(window.scrollX+r.left)+"px").style("top",(window.scrollY+r.bottom+6)+"px");}});
}

function draw(){
  svg.selectAll(".layer").remove();
  const root=svg.append("g").attr("class","layer");

  // edges layer (decorative)
  const D=FALLBACK_DATA;
  const gateCx=D.gate.x+D.gate.w, gateCy=D.gate.y+D.gate.h/2;

  // x -> gate
  root.append("line").attr("aria-hidden","true").attr("x1",D.input.x+D.input.w).attr("y1",D.input.y+D.input.h/2).attr("x2",D.gate.x-4).attr("y2",D.gate.y+D.gate.h/2).attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");

  // gate -> each expert
  D.experts.forEach(e=>{
    const ey=e.y+e.h/2;
    root.append("line").attr("aria-hidden","true")
      .attr("x1",gateCx).attr("y1",gateCy).attr("x2",e.x-4).attr("y2",ey)
      .attr("stroke", e.active?"var(--color-ink)":"var(--color-border)")
      .attr("stroke-width", e.active?1.5:0.75)
      .attr("stroke-dasharray", e.active?null:"5 4")
      .attr("marker-end", e.active?"url(#arrow)":null);
  });

  // active experts -> combine
  const cmbX=D.combine.x, cmbCy=D.combine.y+D.combine.h/2;
  D.experts.filter(e=>e.active).forEach((e,i)=>{
    root.append("line").attr("aria-hidden","true")
      .attr("x1",e.x+e.w).attr("y1",e.y+e.h/2)
      .attr("x2",cmbX-4).attr("y2",cmbCy + (i===0?-12:12))
      .attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");
  });

  // combine -> y (down)
  root.append("line").attr("aria-hidden","true")
    .attr("x1",D.combine.x+D.combine.w/2 + 36).attr("y1",cmbCy)
    .attr("x2",D.combine.x+D.combine.w/2 + 36).attr("y2",D.output.y-4)
    .attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");
  root.append("line").attr("aria-hidden","true")
    .attr("x1",D.combine.x+D.combine.w).attr("y1",cmbCy)
    .attr("x2",D.combine.x+D.combine.w/2 + 36).attr("y2",cmbCy)
    .attr("stroke","var(--color-ink)").attr("stroke-width",1.5);

  // input node
  const inG=root.append("g").attr("class","node").attr("tabindex",0).attr("role","img").attr("aria-label","input x").datum(D.input);
  inG.append("rect").attr("x",D.input.x).attr("y",D.input.y).attr("width",D.input.w).attr("height",D.input.h);
  inG.append("text").attr("class","mono").attr("x",D.input.x+D.input.w/2).attr("y",D.input.y+D.input.h/2+4).attr("text-anchor","middle").text(D.input.label);
  bindTip(inG);

  // gate node
  const gG=root.append("g").attr("class","node").attr("tabindex",0).attr("role","img").attr("aria-label","gating network").datum(D.gate);
  gG.append("rect").attr("x",D.gate.x).attr("y",D.gate.y).attr("width",D.gate.w).attr("height",D.gate.h);
  D.gate.label.forEach((t,i)=>gG.append("text").attr("class","node-label").attr("x",D.gate.x+D.gate.w/2).attr("y",D.gate.y+24+i*16).attr("text-anchor","middle").text(t));
  bindTip(gG);

  // N experts header
  root.append("text").attr("class","small").attr("x",D.experts[0].x+D.experts[0].w/2).attr("y",D.experts[0].y-6).attr("text-anchor","middle").text("N experts");

  // expert nodes
  const exG=root.selectAll(".node.expert").data(D.experts,d=>d.idx).join(
    enter=>{
      const g=enter.append("g").attr("class",d=>"node expert "+(d.active?"active":"inactive"))
        .attr("tabindex",0).attr("role","img").attr("aria-label",d=>"expert "+d.idx+(d.active?" (active)":" (inactive)"));
      g.append("rect").attr("x",d=>d.x).attr("y",d=>d.y).attr("width",d=>d.w).attr("height",d=>d.h);
      g.append("text").attr("class",d=>"node-label "+(d.active?"active":"inactive")).attr("x",d=>d.x+d.w/2).attr("y",d=>d.y+d.h/2+4).attr("text-anchor","middle").text(d=>d.active?"active":"");
      return g;
    }
  );
  bindTip(exG);

  // combine node
  const cG=root.append("g").attr("class","node").attr("tabindex",0).attr("role","img").attr("aria-label","weighted sum").datum(D.combine);
  cG.append("rect").attr("x",D.combine.x).attr("y",D.combine.y).attr("width",D.combine.w).attr("height",D.combine.h);
  D.combine.label.forEach((t,i)=>cG.append("text").attr("class","node-label").attr("x",D.combine.x+D.combine.w/2).attr("y",D.combine.y+22+i*16).attr("text-anchor","middle").text(t));
  bindTip(cG);

  // output node
  const oG=root.append("g").attr("class","node").attr("tabindex",0).attr("role","img").attr("aria-label","output y").datum(D.output);
  oG.append("rect").attr("x",D.output.x).attr("y",D.output.y).attr("width",D.output.w).attr("height",D.output.h);
  oG.append("text").attr("class","mono").attr("x",D.output.x+D.output.w/2).attr("y",D.output.y+D.output.h/2+4).attr("text-anchor","middle").text(D.output.label);
  bindTip(oG);

  // magnitude band
  const b=D.band;
  root.append("line").attr("aria-hidden","true").attr("x1",32).attr("y1",b.line_y).attr("x2",668).attr("y2",b.line_y).attr("stroke","var(--color-border)").attr("stroke-width",0.75);

  root.append("text").attr("class","band-label").attr("x",32).attr("y",b.capacity.text_y).text(b.capacity.label);
  const capG=root.append("g").attr("class","node").attr("tabindex",0).attr("role","img").attr("aria-label",b.capacity.label).datum(b.capacity);
  capG.append("rect").attr("x",32).attr("y",b.capacity.bar_y).attr("width",b.capacity.bar_w).attr("height",14).attr("fill",b.capacity.color).attr("stroke","none");
  bindTip(capG);

  root.append("text").attr("class","band-label").attr("x",32).attr("y",b.compute.text_y).text(b.compute.label);
  const cmpG=root.append("g").attr("class","node").attr("tabindex",0).attr("role","img").attr("aria-label",b.compute.label).datum(b.compute);
  cmpG.append("rect").attr("x",32).attr("y",b.compute.bar_y).attr("width",b.compute.bar_w).attr("height",14).attr("fill",b.compute.color).attr("stroke","none");
  bindTip(cmpG);
}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById("chart"));
</script>
</body>
</html>
